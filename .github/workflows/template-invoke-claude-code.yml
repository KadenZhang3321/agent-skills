# template-invoke-claude-code.yml
# Claude Code 调用模板 — 供其他仓库的工作流复制使用
#
# 使用方式：
# 1. 确保调用方仓库在 agent-skills/.github/allowed-callers.json 白名单中
# 2. 复制下面的 jobs 到你的 workflow 中
# 3. 根据需要调整环境变量和参数
#
# ====================================================================
# 参数说明：
# -------------------------------------------------------------------
# caller_env_vars: 传递给 Claude 的环境变量（格式：key1=value1\nkey2=value2）
# custom_prompt: 自定义 prompt（优先级最高，会覆盖 skill_name）
# skill_name: Skill 名称（如果 custom_prompt 为空则使用）
# model: 使用的模型（默认 qwen/qwen3.6-plus:free）
# allow_code_change: 是否允许 Claude 修改代码（默认 true）
# dangerously_skip_permissions: 跳过权限检查（默认 false）
# allowed_tools: 允许的工具（如 "Bash(git *),Read,Write,Edit"）
# show_full_output: 在日志中显示完整输出（默认 false）
# ====================================================================

jobs:
  invoke-claude-code-with-wait:
    name: Invoke Claude Code (with wait)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AGENT_SKILLS_REPO: opensourceways/agent-skills
      # 以下变量根据你的仓库修改
      CALLER_REPO: your-org/your-repo
      SKILL_NAME: your-skill-name
      MODEL: qwen/qwen3.6-plus:free
      COMMENT_AUTHOR: workflow-bot

    steps:
      - name: Invoke Claude via agent-skills
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # 示例：传递环境变量（根据需要修改）
          # CALLER_ENV_VARS=$(jq -n \
          #   --arg key1 "value1" \
          #   --arg key2 "value2" \
          #   '{key1: $key1, key2: $key2}' | jq -r '. | to_entries | map("\(.key)=\(.value)") | join("\n"))

          # 示例：传递自定义 prompt（根据需要修改）
          # CUSTOM_PROMPT="Your custom prompt here"

          gh api --method POST "https://api.github.com/repos/${{ env.AGENT_SKILLS_REPO }}/dispatches" \
            -f event_type="claude-request" \
            -f client_payload="$(jq -n \
              --arg caller_repo "${{ env.CALLER_REPO }}" \
              --arg skill_name "${{ env.SKILL_NAME }}" \
              --arg model "${{ env.MODEL }}" \
              --arg allow_code_change "true" \
              --arg comment_author "${{ env.COMMENT_AUTHOR }}" \
              --arg caller_env_vars "" \
              --arg custom_prompt "" \
              --arg dangerously_skip_permissions "false" \
              --arg allowed_tools "" \
              --arg show_full_output "false" \
              '{
                caller_repo: $caller_repo,
                skill_name: $skill_name,
                model: $model,
                allow_code_change: $allow_code_change,
                comment_author: $comment_author,
                caller_env_vars: $caller_env_vars,
                custom_prompt: $custom_prompt,
                dangerously_skip_permissions: $dangerously_skip_permissions,
                allowed_tools: $allowed_tools,
                show_full_output: $show_full_output
              }')" \
            --silent --output /dev/null --fail

          echo "dispatched=true" >> "$GITHUB_OUTPUT"

      - name: Wait for Claude execution
        if: steps.dispatch.outputs.dispatched == 'true'
        id: wait
        run: |
          RUN_ID=""
          for attempt in $(seq 1 60); do
            RUN_ID=$(gh run list \
              --repo "${{ env.AGENT_SKILLS_REPO }}" \
              --workflow "_claude-code.yml" \
              -L 5 \
              --json databaseId,displayTitle \
              --jq '[.[] | select(.displayTitle | contains("Handle Claude Request"))][0].databaseId // empty')
            if [ -n "$RUN_ID" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "$RUN_ID" ]; then
            echo "::error::Timeout waiting for Claude execution"
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          gh run watch "$RUN_ID" --repo "${{ env.AGENT_SKILLS_REPO }}" --exit-status

      - name: Check execution result
        if: steps.wait.outputs.run_id
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          CONCLUSION=$(gh run view "${{ steps.wait.outputs.run_id }}" \
            --repo "${{ env.AGENT_SKILLS_REPO }}" \
            --json conclusion --jq '.conclusion')

          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Claude execution failed: $CONCLUSION"
            exit 1
          fi

          echo "execution_success=true" >> "$GITHUB_OUTPUT"

