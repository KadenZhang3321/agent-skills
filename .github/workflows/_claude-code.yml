# _claude-code.yml
# Claude Code Handler — 由白名单仓库通过 repository_dispatch 触发。
#
# 本仓库（opensourceways/agent-skills）需配置以下 Secrets：
#   CLAUDE_API_KEY  — Anthropic API Key（集中管理，调用方无需配置）
#   AGENT_PAT       — 具备 repo 权限的 PAT（用于读写调用方仓库、发布评论、创建 PR）

name: Claude Code Handler

on:
  repository_dispatch:
    types: [claude-request]

jobs:
  claude-code:
    name: Handle Claude Request
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ${{ github.event.client_payload.caller_image || 'ubuntu:latest' }}
      options: --user root

    steps:
      # 安装 Python3 和 Java（容器可能没有预装）
      - name: Install Python3 and Java
        run: apt-get update && apt-get install -y python3 python3-pip curl git bash openjdk-17-jdk
        shell: bash

      # ------------------------------------------------------------------
      # 0. Checkout agent-skills（用于读取白名单和 Skill 文件）
      # ------------------------------------------------------------------
      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          path: agent-skills

      # ------------------------------------------------------------------
      # 1. 白名单校验
      # ------------------------------------------------------------------
      - name: Check caller whitelist
        env:
          CALLER_REPO: ${{ github.event.client_payload.caller_repo }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          caller_repo = os.environ['CALLER_REPO']
          caller_org  = caller_repo.split('/')[0]
          with open('agent-skills/.github/allowed-callers.json') as f:
              config = json.load(f)
          if caller_org in config.get('allowed_orgs', []) or caller_repo in config.get('allowed_repos', []):
              print(f'Caller {caller_repo} is whitelisted')
          else:
              print(f'::error::Caller {caller_repo} is not in the whitelist. '
                    f'Update .github/allowed-callers.json to grant access.')
              sys.exit(1)
          PYEOF
        shell: bash

      # ------------------------------------------------------------------
      # 2. 检查触发者在调用方仓库的权限（需要 write/admin/maintain）
      # ------------------------------------------------------------------
      - name: Check user permission
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          CALLER_REPO: ${{ github.event.client_payload.caller_repo }}
          ACTOR: ${{ github.event.client_payload.comment_author }}
        run: |
          PERMISSION=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$CALLER_REPO/collaborators/$ACTOR/permission" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('permission','none'))")

          if [[ "$PERMISSION" == "write" || "$PERMISSION" == "admin" || "$PERMISSION" == "maintain" ]]; then
            echo "::notice::$ACTOR has $PERMISSION permission on $CALLER_REPO"
          else
            echo "::error::$ACTOR has insufficient permission ($PERMISSION) on $CALLER_REPO"
            exit 1
          fi
        shell: bash

      # ------------------------------------------------------------------
      # 3. Checkout 调用方仓库
      # ------------------------------------------------------------------
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.caller_repo }}
          token: ${{ secrets.AGENT_PAT }}
          path: caller-repo
          fetch-depth: 0

      # ------------------------------------------------------------------
      # 4. 安装 Claude Code CLI（如果容器内没有 Node.js）
      # ------------------------------------------------------------------
      - name: Setup Node.js
        if: github.event.client_payload.caller_image == ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version
        shell: bash

      # ------------------------------------------------------------------
      # 5. 拉取 PR Diff（如果是 PR 评论）
      # ------------------------------------------------------------------
      - name: Fetch PR diff
        if: github.event.client_payload.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          CALLER_REPO: ${{ github.event.client_payload.caller_repo }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
        run: |
          curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "https://api.github.com/repos/$CALLER_REPO/pulls/$PR_NUMBER" \
            -o /tmp/pr.diff \
          || touch /tmp/pr.diff
          echo "PR diff: $(wc -c < /tmp/pr.diff) bytes"
        shell: bash

      # ------------------------------------------------------------------
      # 6. 构建 prompt
      # ------------------------------------------------------------------
      - name: Build prompt
        env:
          CALLER_REPO: ${{ github.event.client_payload.caller_repo }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          COMMENT_BODY: ${{ github.event.client_payload.comment_body }}
          COMMENT_AUTHOR: ${{ github.event.client_payload.comment_author }}
          SKILL_NAME: ${{ github.event.client_payload.skill_name }}
          ALLOW_CODE_CHANGE: ${{ github.event.client_payload.allow_code_change }}
        run: |
          python3 - <<'PYEOF'
          import os

          caller_repo       = os.environ.get('CALLER_REPO', '')
          pr_number         = os.environ.get('PR_NUMBER', '') or ''
          comment_body      = os.environ.get('COMMENT_BODY', '') or ''
          comment_author    = os.environ.get('COMMENT_AUTHOR', '')
          skill_name        = os.environ.get('SKILL_NAME', '') or ''
          skill_url         = os.environ.get('SKILL_URL', '') or ''
          allow_code_change = os.environ.get('ALLOW_CODE_CHANGE', 'false').lower() == 'true'

          # 加载 Skill 指令
          # 优先级：1) skill_url（远程URL）2) skill_name - 调用方 .github/skills/ 3) skill_name - 调用方 .ai/skills/ 4) skill_name - agent-skills skills/
          skill_prompt = ''

          # 优先：远程 URL
          if skill_url:
              try:
                  import urllib.request
                  skill_prompt = urllib.request.urlopen(skill_url).read().decode()
                  print(f'Loaded skill from URL: {skill_url}')
              except Exception as e:
                  print(f'Warning: failed to load skill from URL: {e}')
                  skill_prompt = ''
          # 其次：本地文件
          elif skill_name:
              candidates = [
                  f'caller-repo/.github/skills/{skill_name}/SKILL.md',
                  f'caller-repo/.ai/skills/{skill_name}/SKILL.md',
                  f'agent-skills/skills/{skill_name}/SKILL.md',
              ]
              for skill_path in candidates:
                  try:
                      skill_prompt = open(skill_path).read()
                      print(f'Loaded skill from: {skill_path}')
                      break
                  except FileNotFoundError:
                      continue
              if not skill_prompt:
                  print(f'Warning: skill "{skill_name}" not found in any of: {candidates}')

          parts = [f'You are a code assistant for repository **{caller_repo}**. Always respond in the same language as the user\'s request. If the user writes in Chinese, respond in Chinese.']

          if skill_prompt:
              parts.append(f'## Skill Instructions\n\n{skill_prompt}')

          if pr_number:
              parts.append(f'You are reviewing **PR #{pr_number}** in {caller_repo}.')
              try:
                  diff = open('/tmp/pr.diff').read().strip()
                  if diff:
                      if len(diff) > 100_000:
                          diff = diff[:100_000] + '\n\n[diff truncated at 100KB]'
                      parts.append(f'## PR Diff\n\n```diff\n{diff}\n```')
              except FileNotFoundError:
                  pass

          if comment_body.strip():
              parts.append(f'## Request from @{comment_author}\n\n{comment_body.strip()}')

          if allow_code_change:
              parts.append(
                  'The repository is checked out in the current working directory.\n'
                  'You have FULL permission to **edit, create, and delete files** to fix issues or implement improvements.\n'
                  'Please directly make the necessary code changes, then run verify_command to validate.\n'
                  'After making changes, summarize what you changed and why.'
              )
          else:
              parts.append(
                  'The repository is checked out in the current working directory.\n'
                  'Provide a detailed code review with specific, actionable suggestions.\n'
                  'Do NOT modify any files.'
              )

          prompt = '\n\n'.join(parts)

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write('CLAUDE_PROMPT<<PROMPT_EOF\n' + prompt + '\nPROMPT_EOF\n')

          print(f'Prompt ready: {len(prompt)} chars')
          PYEOF

      # ------------------------------------------------------------------
      # 7. 调用 Claude Code
      # ------------------------------------------------------------------
      - name: Invoke Claude Code
        id: claude_run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          MODEL: ${{ github.event.client_payload.model || 'claude-sonnet-4-20250514' }}
          ALLOW_CODE_CHANGE: ${{ github.event.client_payload.allow_code_change }}
        working-directory: caller-repo
        run: |
          if [[ -z "$ANTHROPIC_API_KEY" ]]; then
            echo "::error::CLAUDE_API_KEY is not configured in the agent-skills repository secrets"
            exit 1
          fi

          if [[ "$ALLOW_CODE_CHANGE" == "true" ]]; then
            TOOLS="Read,Edit,Write,Glob,Grep,Bash"
          else
            TOOLS="Read,Glob,Grep,Bash"
          fi

          claude -p "$CLAUDE_PROMPT" \
            --model "$MODEL" \
            --allowedTools "$TOOLS" \
            --output-format json \
            2>/tmp/claude_stderr.txt \
            > /tmp/claude_raw.json
          EXIT_CODE=$?

          python3 - <<'PYEOF'
          import json, os

          try:
              data = json.loads(open('/tmp/claude_raw.json').read())
              result        = data.get('result', '')
              cost          = data.get('cost_usd', data.get('total_cost_usd', 0)) or 0
              usage         = data.get('usage', {})
              input_tokens  = usage.get('input_tokens', 'N/A')
              output_tokens = usage.get('output_tokens', 'N/A')
          except Exception as e:
              print(f'Warning: could not parse JSON output: {e}')
              result        = open('/tmp/claude_raw.json').read()
              cost          = 'N/A'
              input_tokens  = 'N/A'
              output_tokens = 'N/A'

          open('/tmp/claude_output.txt', 'w').write(result)
          print(result[:1000])

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'cost_usd={cost}\n')
              f.write(f'input_tokens={input_tokens}\n')
              f.write(f'output_tokens={output_tokens}\n')
          PYEOF

          if git status --porcelain | grep -q .; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          fi

          exit $EXIT_CODE

      # ------------------------------------------------------------------
      # 8. 执行验证命令（仅当 verify_command 不为空时）
      # ------------------------------------------------------------------
      - name: Run verify command
        if: github.event.client_payload.verify_command != ''
        id: verify
        working-directory: caller-repo
        run: |
          ${{ github.event.client_payload.verify_command }}
        timeout-minutes: 30
        shell: bash

      # ------------------------------------------------------------------
      # 9. 直接提交到当前 PR 分支（仅当 Claude 修改了代码时）
      # ------------------------------------------------------------------
      - name: Commit Claude's changes to PR branch
        if: steps.claude_run.outputs.code_changed == 'true' && github.event.client_payload.allow_code_change == 'true' && (github.event.client_payload.verify_command == '' || steps.verify.conclusion == 'success')
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          CALLER_REPO: ${{ github.event.client_payload.caller_repo }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
        working-directory: caller-repo
        run: |
          git config user.name "Claude Code Bot"
          git config user.email "claude-bot@users.noreply.github.com"

          # 如果是 PR 评论触发，获取 PR 的 head 分支并切换过去
          if [[ -n "$PR_NUMBER" ]]; then
            PR_BRANCH=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$CALLER_REPO/pulls/$PR_NUMBER" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['head']['ref'])")
            git checkout "$PR_BRANCH" 2>/dev/null || git checkout -b "$PR_BRANCH"
            echo "::notice::Committing to PR branch: $PR_BRANCH"
          fi

          git add -A
          git commit -m "fix: code improvements suggested by Claude Code Bot"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${CALLER_REPO}.git" HEAD
          echo "pr_url=" >> "$GITHUB_OUTPUT"
        shell: bash

      # ------------------------------------------------------------------
      # 9. 将 Claude 的回复发布为评论
      # ------------------------------------------------------------------
      - name: Post comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          CALLER_REPO: ${{ github.event.client_payload.caller_repo }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess

          try:
              output = open('/tmp/claude_output.txt').read().strip()
          except FileNotFoundError:
              output = ''

          if not output:
              output = '_Claude returned an empty response._'

          pr_url = os.environ.get('PR_URL', '')

          body = f'## Claude Code Analysis\n\n{output}'
          if pr_url:
              body += f'\n\n---\nI made code changes and opened a PR: {pr_url}'

          comment = json.dumps({'body': body})
          repo  = os.environ['CALLER_REPO']
          issue = os.environ['ISSUE_NUMBER']
          token = os.environ['GH_TOKEN']

          r = subprocess.run([
            'curl', '-sf', '-X', 'POST',
            '-H', f'Authorization: Bearer {token}',
            '-H', 'Accept: application/vnd.github+json',
            f'https://api.github.com/repos/{repo}/issues/{issue}/comments',
            '-d', comment,
          ], capture_output=True, text=True)

          if r.returncode == 0:
              print('Comment posted successfully')
          else:
              print(f'::warning::Failed to post comment: {r.stderr}')
          PYEOF

      # ------------------------------------------------------------------
      # 10. Job 执行摘要
      # ------------------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          echo "### Claude Code Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Caller repo | \`${{ github.event.client_payload.caller_repo }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | \`${{ github.event.client_payload.comment_author }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PR | \`${{ github.event.client_payload.pr_number || 'N/A' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Model | \`${{ github.event.client_payload.model || 'claude-sonnet-4-20250514' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Code changed | \`${{ steps.claude_run.outputs.code_changed }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Caller image | \`${{ github.event.client_payload.caller_image || 'N/A' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify command | \`${{ github.event.client_payload.verify_command || 'N/A' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify result | \`${{ steps.verify.outcome || 'skipped' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| New PR | \`${{ steps.create_pr.outputs.pr_url || 'N/A' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Input tokens | \`${{ steps.claude_run.outputs.input_tokens }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Output tokens | \`${{ steps.claude_run.outputs.output_tokens }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cost (USD) | \`${{ steps.claude_run.outputs.cost_usd }}\` |" >> "$GITHUB_STEP_SUMMARY"
