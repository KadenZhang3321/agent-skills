# _claude-code.yml
# Claude Code Handler — 仅支持 workflow_call 触发器。
#
# 本仓库（KadenZhang3321/agent-skills）需配置以下 Secrets：
#   CLAUDE_API_KEY  — Anthropic API Key（集中管理，调用方无需配置）
#   DISPATCH_TOKEN  — 具备 repo 权限的 PAT（用于读写调用方仓库、发布评论、创建 PR）

name: Claude Code Handler

on:
  workflow_call:
    inputs:
      caller_repo:
        description: '调用方仓库路径 (owner/repo)'
        required: true
        type: string
      custom_prompt:
        description: '自定义 prompt（可选）'
        required: false
        type: string
        default: ''
      skill_name:
        description: 'Skill 名称（可选）'
        required: false
        type: string
        default: ''
      skill_url:
        description: 'Skill URL（可选）'
        required: false
        type: string
        default: ''
      allow_code_change:
        description: '是否允许代码修改'
        required: false
        type: boolean
        default: false
      model:
        description: 'Claude 模型名称'
        required: false
        type: string
        default: 'claude-sonnet-4-20250514'
      dangerously_skip_permissions:
        description: '跳过权限确认'
        required: false
        type: boolean
        default: false
      allowed_tools:
        description: '允许的工具列表'
        required: false
        type: string
        default: ''
      show_full_output:
        description: '显示完整输出'
        required: false
        type: boolean
        default: false
      caller_env_vars:
        description: '调用方环境变量（\n 分隔）'
        required: false
        type: string
        default: ''
      caller_image:
        description: '自定义容器镜像'
        required: false
        type: string
        default: ''
      verify_command:
        description: '验证命令'
        required: false
        type: string
        default: ''
      pr_number:
        description: 'PR 编号'
        required: false
        type: string
        default: ''
      issue_number:
        description: 'Issue 编号'
        required: false
        type: string
        default: ''
      comment_author:
        description: '评论作者'
        required: false
        type: string
        default: 'workflow'
      comment_body:
        description: '评论内容'
        required: false
        type: string
        default: ''
    secrets:
      DISPATCH_TOKEN:
        description: 'GitHub PAT（repo 权限）'
        required: true
      CLAUDE_API_KEY:
        description: 'Anthropic API Key'
        required: true
    outputs:
      changes_detected:
        description: '是否检测到代码变更'
        value: ${{ jobs.claude-code.outputs.changes_detected }}
      commit_sha:
        description: '提交 SHA（如有变更）'
        value: ${{ jobs.claude-code.outputs.commit_sha }}
      pr_url:
        description: '创建的 PR URL（如有）'
        value: ${{ jobs.claude-code.outputs.pr_url }}
      cost_usd:
        description: 'API 调用成本（USD）'
        value: ${{ jobs.claude-code.outputs.cost_usd }}
      input_tokens:
        description: '输入 token 数'
        value: ${{ jobs.claude-code.outputs.input_tokens }}
      output_tokens:
        description: '输出 token 数'
        value: ${{ jobs.claude-code.outputs.output_tokens }}
      response_summary:
        description: 'Claude 回复摘要'
        value: ${{ jobs.claude-code.outputs.response_summary }}
      error_message:
        description: '错误信息（如有）'
        value: ${{ jobs.claude-code.outputs.error_message }}

jobs:
  claude-code:
    name: Handle Claude Request
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ${{ inputs.caller_image || 'ubuntu:24.04' }}
      options: --user root
    outputs:
      changes_detected: ${{ steps.claude_run.outputs.changes_detected }}
      commit_sha: ${{ steps.claude_run.outputs.commit_sha }}
      pr_url: ${{ steps.claude_run.outputs.pr_url }}
      cost_usd: ${{ steps.claude_run.outputs.cost_usd }}
      input_tokens: ${{ steps.claude_run.outputs.input_tokens }}
      output_tokens: ${{ steps.claude_run.outputs.output_tokens }}
      response_summary: ${{ steps.claude_run.outputs.response_summary }}
      error_message: ${{ steps.claude_run.outputs.error_message }}

    steps:
      # Checkout agent-skills（用于读取白名单和 Skill 文件）
      - name: Checkout agent-skills
        uses: actions/checkout@v4
        with:
          repository: KadenZhang3321/agent-skills
          ref: main
          path: agent-skills

      # Install base dependencies
      - name: Install base dependencies
        if: inputs.caller_image == ''
        run: |
          apt-get update && apt-get install -y python3 python3-pip curl git bash gh
          rm -rf /var/lib/apt/lists/*
        shell: bash

      - name: Setup Node.js
        if: inputs.caller_image == ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: |
          if ! command -v claude &> /dev/null; then
            npm install -g @anthropic-ai/claude-code
          fi
          claude --version
        shell: bash

      # 白名单校验
      - name: Check caller whitelist
        env:
          CALLER_REPO: ${{ inputs.caller_repo }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          caller_repo = os.environ['CALLER_REPO']
          caller_org  = caller_repo.split('/')[0]
          with open('agent-skills/.github/allowed-callers.json') as f:
              config = json.load(f)
          if caller_org in config.get('allowed_orgs', []) or caller_repo in config.get('allowed_repos', []):
              print(f'Caller {caller_repo} is whitelisted')
          else:
              print(f'::error::Caller {caller_repo} is not in the whitelist. '
                    f'Update .github/allowed-callers.json to grant access.')
              sys.exit(1)
          PYEOF
        shell: bash

      # 检查触发者在调用方仓库的权限
      - name: Check user permission
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          CALLER_REPO: ${{ inputs.caller_repo }}
          ACTOR: ${{ inputs.comment_author }}
        run: |
          PERMISSION=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$CALLER_REPO/collaborators/$ACTOR/permission" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('permission','none'))")

          if [[ "$PERMISSION" == "write" || "$PERMISSION" == "admin" || "$PERMISSION" == "maintain" ]]; then
            echo "::$ACTOR has $PERMISSION permission on $CALLER_REPO"
          else
            echo "::error::$ACTOR has insufficient permission ($PERMISSION) on $CALLER_REPO"
            exit 1
          fi
        shell: bash

      # Checkout 调用方仓库
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.caller_repo }}
          token: ${{ secrets.DISPATCH_TOKEN }}
          path: caller-repo
          fetch-depth: 0

      # 设置调用方仓库的环境变量
      - name: Setup caller environment variables
        if: inputs.caller_env_vars != ''
        run: |
          echo "${{ inputs.caller_env_vars }}" >> $GITHUB_ENV
          echo "::notice::Loaded caller environment variables"
        shell: bash

      # 拉取 PR Diff
      - name: Fetch PR diff
        if: inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          CALLER_REPO: ${{ inputs.caller_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "https://api.github.com/repos/$CALLER_REPO/pulls/$PR_NUMBER" \
            -o /tmp/pr.diff \
          || touch /tmp/pr.diff
          echo "PR diff: $(wc -c < /tmp/pr.diff) bytes"
        shell: bash

      # 构建 prompt
      - name: Build prompt
        env:
          CALLER_REPO: ${{ inputs.caller_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
          COMMENT_BODY: ${{ inputs.comment_body }}
          COMMENT_AUTHOR: ${{ inputs.comment_author }}
          SKILL_NAME: ${{ inputs.skill_name }}
          SKILL_URL: ${{ inputs.skill_url }}
          CUSTOM_PROMPT: ${{ inputs.custom_prompt }}
          ALLOW_CODE_CHANGE: ${{ inputs.allow_code_change }}
        run: |
          python3 - <<'PYEOF'
          import os

          caller_repo       = os.environ.get('CALLER_REPO', '')
          pr_number         = os.environ.get('PR_NUMBER', '') or ''
          comment_body      = os.environ.get('COMMENT_BODY', '') or ''
          comment_author    = os.environ.get('COMMENT_AUTHOR', '')
          skill_name        = os.environ.get('SKILL_NAME', '') or ''
          skill_url         = os.environ.get('SKILL_URL', '') or ''
          custom_prompt     = os.environ.get('CUSTOM_PROMPT', '') or ''
          allow_code_change = os.environ.get('ALLOW_CODE_CHANGE', 'false').lower() == 'true'

          skill_prompt = ''

          if custom_prompt:
              skill_prompt = custom_prompt
              print(f'Using custom_prompt directly')
          elif skill_url:
              try:
                  import urllib.request
                  skill_prompt = urllib.request.urlopen(skill_url).read().decode()
                  print(f'Loaded skill from URL: {skill_url}')
              except Exception as e:
                  print(f'Warning: failed to load skill from URL: {e}')
                  skill_prompt = ''
          elif skill_name:
              candidates = [
                  f'caller-repo/.github/skills/{skill_name}/SKILL.md',
                  f'caller-repo/.ai/skills/{skill_name}/SKILL.md',
                  f'agent-skills/skills/{skill_name}/SKILL.md',
              ]
              for skill_path in candidates:
                  try:
                      skill_prompt = open(skill_path).read()
                      print(f'Loaded skill from: {skill_path}')
                      break
                  except FileNotFoundError:
                      continue
              if not skill_prompt:
                  print(f'Warning: skill "{skill_name}" not found in any of: {candidates}')

          parts = [f'You are a code assistant for repository **{caller_repo}**. Always respond in the same language as the user\'s request. If the user writes in Chinese, respond in Chinese.']

          if skill_prompt:
              parts.append(f'## Skill Instructions\n\n{skill_prompt}')

          if pr_number:
              parts.append(f'You are reviewing **PR #{pr_number}** in {caller_repo}.')
              try:
                  diff = open('/tmp/pr.diff').read().strip()
                  if diff:
                      if len(diff) > 100_000:
                          diff = diff[:100_000] + '\n\n[diff truncated at 100KB]'
                      parts.append(f'## PR Diff\n\n```diff\n{diff}\n```')
              except FileNotFoundError:
                  pass

          if comment_body.strip():
              parts.append(f'## Request from @{comment_author}\n\n{comment_body.strip()}')

          if allow_code_change:
              parts.append(
                  'The repository is checked out in the current working directory.\n'
                  'You have FULL permission to **edit, create, and delete files** to fix issues or implement improvements.\n'
                  'Please directly make the necessary code changes, then run verify_command to validate.\n'
                  'After making changes, summarize what you changed and why.'
              )
          else:
              parts.append(
                  'The repository is checked out in the current working directory.\n'
                  'Provide a detailed code review with specific, actionable suggestions.\n'
                  'Do NOT modify any files.'
              )

          prompt = '\n\n'.join(parts)

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write('CLAUDE_PROMPT<<PROMPT_EOF\n' + prompt + '\nPROMPT_EOF\n')

          print(f'Prompt ready: {len(prompt)} chars')
          PYEOF
        shell: bash

      # 调用 Claude Code
      - name: Invoke Claude Code
        id: claude_run
        shell: bash
        env:
          MODEL: ${{ inputs.model }}
          ALLOW_CODE_CHANGE: ${{ inputs.allow_code_change }}
          DANGEROUSLY_SKIP_PERMISSIONS: ${{ inputs.dangerously_skip_permissions }}
          ALLOWED_TOOLS: ${{ inputs.allowed_tools }}
          SHOW_FULL_OUTPUT: ${{ inputs.show_full_output }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        working-directory: caller-repo
        run: |
          # 构建 Claude 参数（只构建一次）
          CLAUDE_ARGS="--model $MODEL --output-format json"
          
          if [[ "$DANGEROUSLY_SKIP_PERMISSIONS" == "true" ]]; then
            CLAUDE_ARGS="$CLAUDE_ARGS --dangerously-skip-permissions"
          fi
          
          if [[ -n "$ALLOWED_TOOLS" ]]; then
            CLAUDE_ARGS="$CLAUDE_ARGS --allowedTools $ALLOWED_TOOLS"
          else
            if [[ "$ALLOW_CODE_CHANGE" == "true" ]]; then
              CLAUDE_ARGS="$CLAUDE_ARGS --allowedTools Read,Edit,Write,Glob,Grep,Bash"
            else
              CLAUDE_ARGS="$CLAUDE_ARGS --allowedTools Read,Glob,Grep,Bash"
            fi
          fi
          
          # 重试机制（最多 3 次，指数退避）
          MAX_RETRIES=3
          EXIT_CODE=1
          
          for attempt in 1 2 3; do
            if [[ "$SHOW_FULL_OUTPUT" == "true" ]]; then
              echo "::group::Claude Code Full Output (Attempt $attempt/$MAX_RETRIES)"
            fi
            
            echo "=== Claude Code Attempt $attempt/$MAX_RETRIES ==="
            
            set +e
            claude -p "$CLAUDE_PROMPT" $CLAUDE_ARGS \
              2>/tmp/claude_stderr.txt \
              > /tmp/claude_raw.json
            EXIT_CODE=$?
            set -e
            
            if [[ "$SHOW_FULL_OUTPUT" == "true" ]]; then
              echo "::endgroup::"
            fi
            
            if [[ $EXIT_CODE -eq 0 ]]; then
              echo "=== Claude Code succeeded on attempt $attempt ==="
              break
            fi
            
            if [[ $attempt -lt $MAX_RETRIES ]]; then
              WAIT_TIME=$((10 * attempt))
              echo "=== Claude Code failed (exit $EXIT_CODE). Retrying in ${WAIT_TIME}s... ==="
              sleep $WAIT_TIME
            fi
          done
          
          # 导出 EXIT_CODE 供 Python 使用
          echo "EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV
          
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "::error::Claude Code failed after $MAX_RETRIES attempts"
          fi
          
          # 解析 JSON 输出
          python3 - <<'PYEOF'
          import json, os, sys
          
          exit_code = int(os.environ.get('EXIT_CODE', '1'))
          error_message = ''
          
          try:
              data = json.loads(open('/tmp/claude_raw.json').read())
              result        = data.get('result', '')
              cost          = data.get('cost_usd', data.get('total_cost_usd', 0)) or 0
              usage         = data.get('usage', {})
              input_tokens  = usage.get('input_tokens', 'N/A')
              output_tokens = usage.get('output_tokens', 'N/A')
              
              # 提取回复摘要（前 500 字符）
              response_summary = result[:500].replace('\n', ' ').replace('\r', ' ') if result else 'No response'
          except Exception as e:
              print(f'Warning: could not parse JSON output: {e}')
              result        = open('/tmp/claude_raw.json').read() if os.path.exists('/tmp/claude_raw.json') else ''
              cost          = 'N/A'
              input_tokens  = 'N/A'
              output_tokens = 'N/A'
              response_summary = 'Failed to parse Claude output'
              error_message = f'JSON parse error: {str(e)}'
          
          # 保存完整回复
          open('/tmp/claude_output.txt', 'w').write(result)
          print(f'Response summary: {response_summary[:200]}')
          
          # 写入 outputs
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'cost_usd={cost}\n')
              f.write(f'input_tokens={input_tokens}\n')
              f.write(f'output_tokens={output_tokens}\n')
              f.write(f'response_summary={response_summary}\n')
              if error_message:
                  f.write(f'error_message={error_message}\n')
          PYEOF
          
          # 检测代码变更
          if git status --porcelain | grep -q .; then
            echo "changes_detected=true" >> "$GITHUB_OUTPUT"
            
            # 获取当前 commit SHA
            COMMIT_SHA=$(git rev-parse HEAD)
            echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
            
            # 简化处理，实际可能需要更复杂的逻辑来检测新 PR
            echo "pr_url=" >> "$GITHUB_OUTPUT"
          else
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
            echo "pr_url=" >> "$GITHUB_OUTPUT"
          fi
          
          exit $EXIT_CODE

      # 执行验证命令
      - name: Run verify command
        if: inputs.verify_command != ''
        id: verify
        working-directory: caller-repo
        run: |
          ${{ inputs.verify_command }}
        timeout-minutes: 30
        shell: bash

      # 生成 patch 文件并上传 artifact
      - name: Create patch file
        id: create_patch
        if: steps.claude_run.outputs.changes_detected == 'true'
        working-directory: caller-repo
        run: |
          git add -A
          git diff --cached --no-color > /tmp/claude-changes.patch
          git reset
          PATCH_SIZE=$(wc -c < /tmp/claude-changes.patch)
          echo "patch_size=$PATCH_SIZE" >> "$GITHUB_OUTPUT"
          echo "patch_path=/tmp/claude-changes.patch" >> "$GITHUB_OUTPUT"
          echo "::notice::Created patch file: $PATCH_SIZE bytes"

      - name: Upload patch as artifact
        if: steps.create_patch.outputs.patch_path
        uses: actions/upload-artifact@v4
        with:
          name: claude-changes-patch
          path: ${{ steps.create_patch.outputs.patch_path }}
          retention-days: 1

      # Post Claude response as comment
      - name: Post comment
        if: always() && inputs.issue_number != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          CALLER_REPO: ${{ inputs.caller_repo }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ERROR_MESSAGE: ${{ steps.claude_run.outputs.error_message }}
        run: |
          if [[ -n "$ERROR_MESSAGE" ]]; then
            printf -v body '## Claude Code Failed\n\n%s' "$ERROR_MESSAGE"
          else
            output=$(cat /tmp/claude_output.txt 2>/dev/null || echo "")
            if [[ -z "$output" ]]; then
              output="_Claude returned an empty response._"
            fi
            printf -v body '## Claude Code Analysis\n\n%s' "$output"
          fi

          if gh api repos/$CALLER_REPO/issues/$ISSUE_NUMBER/comments \
            --method POST \
            --field body="$body" >/dev/null 2>&1; then
            echo "Comment posted successfully"
          else
            echo "::warning::Failed to post comment"
          fi

      # Job 执行摘要
      - name: Write job summary
        if: always()
        env:
          CALLER_REPO: ${{ inputs.caller_repo }}
          COMMENT_AUTHOR: ${{ inputs.comment_author }}
          PR_NUMBER: ${{ inputs.pr_number || 'N/A' }}
          MODEL: ${{ inputs.model }}
          CHANGES_DETECTED: ${{ steps.claude_run.outputs.changes_detected }}
          COMMIT_SHA: ${{ steps.claude_run.outputs.commit_sha || 'N/A' }}
          PR_URL: ${{ steps.claude_run.outputs.pr_url || 'N/A' }}
          CALLER_IMAGE: ${{ inputs.caller_image || 'N/A' }}
          VERIFY_COMMAND: ${{ inputs.verify_command || 'N/A' }}
          VERIFY_RESULT: ${{ steps.verify.outcome || 'N/A' }}
          INPUT_TOKENS: ${{ steps.claude_run.outputs.input_tokens }}
          OUTPUT_TOKENS: ${{ steps.claude_run.outputs.output_tokens }}
          COST_USD: ${{ steps.claude_run.outputs.cost_usd }}
          RESPONSE_SUMMARY: ${{ steps.claude_run.outputs.response_summary }}
          ERROR_MESSAGE: ${{ steps.claude_run.outputs.error_message }}
        run: |
          python3 - <<'PYEOF'
          import os

          summary_path = os.environ['GITHUB_STEP_SUMMARY']
          lines = [
            "### Claude Code Run Summary",
            "",
            "| Field | Value |",
            "|-------|-------|",
            f"| Caller repo | `{os.environ['CALLER_REPO']}` |",
            f"| Triggered by | `{os.environ['COMMENT_AUTHOR']}` |",
            f"| PR | `{os.environ['PR_NUMBER']}` |",
            f"| Model | `{os.environ['MODEL']}` |",
            f"| Changes detected | `{os.environ['CHANGES_DETECTED']}` |",
            f"| Commit SHA | `{os.environ['COMMIT_SHA']}` |",
            f"| PR URL | `{os.environ['PR_URL']}` |",
            f"| Caller image | `{os.environ['CALLER_IMAGE']}` |",
            f"| Verify command | `{os.environ['VERIFY_COMMAND']}` |",
            f"| Verify result | `{os.environ['VERIFY_RESULT']}` |",
            f"| Input tokens | `{os.environ['INPUT_TOKENS']}` |",
            f"| Output tokens | `{os.environ['OUTPUT_TOKENS']}` |",
            f"| Cost (USD) | `{os.environ['COST_USD']}` |",
            f"| Response summary | `{os.environ['RESPONSE_SUMMARY']}` |",
          ]

          error_msg = os.environ.get('ERROR_MESSAGE', '')
          if error_msg:
            lines.append(f"| **Error** | `{error_msg}` |")

          with open(summary_path, 'a') as f:
            f.write('\n'.join(lines) + '\n')
          PYEOF
