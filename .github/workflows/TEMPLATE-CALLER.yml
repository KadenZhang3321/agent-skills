# TEMPLATE-CALLER.yml
# 通用调用模板 - 展示如何在业务仓库中调用中心 Claude Code 服务
#
# 使用方法：
# 1. 复制此文件到你的业务仓库的 .github/workflows/ 目录
# 2. 根据需要修改触发条件和参数
# 3. 确保在仓库 Settings → Secrets 中配置了 DISPATCH_TOKEN 和 CLAUDE_API_KEY

name: Claude Code Caller Template

on:
  # 方式 1：手动触发（测试用）
  workflow_dispatch:
    inputs:
      prompt:
        description: '要执行的 prompt'
        required: true
        default: '请分析这个仓库的代码结构'
      allow_code_change:
        description: '是否允许代码修改'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  # 方式 2：PR 评论触发
  issue_comment:
    types: [created]

  # 方式 3：PR 打开或更新时自动触发
  pull_request:
    types: [opened, synchronize]

jobs:
  # --------------------------------------------------------------------------
  # 方式 A：手动触发
  # --------------------------------------------------------------------------
  claude-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: KadenZhang3321/agent-skills/.github/workflows/_claude-code.yml@main
    with:
      caller_repo: ${{ github.repository }}
      custom_prompt: ${{ github.event.inputs.prompt }}
      allow_code_change: ${{ github.event.inputs.allow_code_change == 'true' }}
      model: 'claude-sonnet-4-20250514'
      show_full_output: true
      allowed_tools: 'Bash(git *),Bash(gh *),Read,Write,Edit,Glob,Grep'
    secrets:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

  claude-manual-result:
    if: github.event_name == 'workflow_dispatch'
    needs: claude-manual
    runs-on: ubuntu-latest
    steps:
      - name: Check Claude result
        run: |
          echo "Changes detected: ${{ needs.claude-manual.outputs.changes_detected }}"
          echo "Cost: ${{ needs.claude-manual.outputs.cost_usd }} USD"
          echo "Input tokens: ${{ needs.claude-manual.outputs.input_tokens }}"
          echo "Output tokens: ${{ needs.claude-manual.outputs.output_tokens }}"
          echo "Response summary: ${{ needs.claude-manual.outputs.response_summary }}"
          
          if [[ "${{ needs.claude-manual.outputs.error_message }}" != "" ]]; then
            echo "Error: ${{ needs.claude-manual.outputs.error_message }}"
            exit 1
          fi

  # 【可选】自动应用 Claude 的代码修改
  # 仅当 changes_detected == 'true' 时才会执行
  claude-manual-apply:
    if: ${{ needs.claude-manual.outputs.changes_detected == 'true' && github.event_name == 'workflow_dispatch' }}
    needs: claude-manual
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          fetch-depth: 0

      - name: Download patch artifact
        uses: actions/download-artifact@v4
        with:
          name: claude-changes-patch
          path: /tmp/patch

      - name: Apply patch and create draft PR
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          git config user.name "Claude Bot"
          git config user.email "claude-bot@users.noreply.github.com"
          if [ ! -s /tmp/patch/claude-changes.patch ]; then
            echo "::warning::Patch file is empty, nothing to apply"
            exit 0
          fi

          BASE_BRANCH=$(git branch --show-current)
          NEW_BRANCH="claude-patch-${{ github.run_id }}"

          git checkout -b "$NEW_BRANCH"
          git apply /tmp/patch/claude-changes.patch
          git add -A
          git commit -m "AI: apply Claude suggestions"
          git push origin "$NEW_BRANCH"

          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$NEW_BRANCH" \
            --title "[Claude] Auto patch from run ${{ github.run_id }}" \
            --body "This PR was generated by applying the Claude patch artifact. Please review before merging." \
            --draft

          echo "::notice::Created draft PR from branch $NEW_BRANCH to $BASE_BRANCH"

  # --------------------------------------------------------------------------
  # 方式 B：PR 评论触发（仅响应包含 @claude 的 PR 评论）
  # --------------------------------------------------------------------------
  claude-comment:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude') &&
      !endsWith(github.actor, '[bot]') &&
      github.actor != 'dependabot'
    uses: KadenZhang3321/agent-skills/.github/workflows/_claude-code.yml@main
    with:
      caller_repo: ${{ github.repository }}
      pr_number: ${{ github.event.issue.number }}
      issue_number: ${{ github.event.issue.number }}
      comment_author: ${{ github.event.comment.user.login }}
      comment_body: ${{ github.event.comment.body }}
      allow_code_change: false
      model: 'claude-sonnet-4-20250514'
    secrets:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

  # 【可选】自动应用 Claude 的代码修改
  # 仅当 changes_detected == 'true' 时才会执行
  claude-comment-apply:
    if: ${{ needs.claude-comment.outputs.changes_detected == 'true' && github.event_name == 'issue_comment' }}
    needs: claude-comment
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          HEAD=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefName -q .headRefName)
          BASE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json baseRefName -q .baseRefName)
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head }}
          token: ${{ secrets.DISPATCH_TOKEN }}
          fetch-depth: 0

      - name: Download patch artifact
        uses: actions/download-artifact@v4
        with:
          name: claude-changes-patch
          path: /tmp/patch

      - name: Apply patch and create draft PR
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          git config user.name "Claude Bot"
          git config user.email "claude-bot@users.noreply.github.com"
          if [ ! -s /tmp/patch/claude-changes.patch ]; then
            echo "::warning::Patch file is empty, nothing to apply"
            exit 0
          fi

          BASE_BRANCH="${{ steps.pr.outputs.base }}"
          NEW_BRANCH="claude-patch-${{ github.run_id }}"

          git checkout -b "$NEW_BRANCH"
          git apply /tmp/patch/claude-changes.patch
          git add -A
          git commit -m "AI: apply Claude suggestions"
          git push origin "$NEW_BRANCH"

          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$NEW_BRANCH" \
            --title "[Claude] Auto patch from run ${{ github.run_id }}" \
            --body "This PR was generated by applying the Claude patch artifact. Please review before merging." \
            --draft

          echo "::notice::Created draft PR from branch $NEW_BRANCH to $BASE_BRANCH"

  # --------------------------------------------------------------------------
  # 方式 C：PR 自动触发
  # --------------------------------------------------------------------------
  claude-auto-pr:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    uses: KadenZhang3321/agent-skills/.github/workflows/_claude-code.yml@main
    with:
      caller_repo: ${{ github.repository }}
      pr_number: ${{ github.event.pull_request.number }}
      issue_number: ${{ github.event.pull_request.number }}
      comment_author: ${{ github.event.pull_request.user.login }}
      comment_body: 'Auto-triggered: Please review this PR and suggest improvements.'
      allow_code_change: false
      skill_name: 'github-action-diagnose'
      model: 'claude-sonnet-4-20250514'
    secrets:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

  # 【可选】自动应用 Claude 的代码修改
  # 仅当 changes_detected == 'true' 时才会执行
  claude-auto-pr-apply:
    if: ${{ needs.claude-auto-pr.outputs.changes_detected == 'true' && github.event_name == 'pull_request' }}
    needs: claude-auto-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.DISPATCH_TOKEN }}
          fetch-depth: 0

      - name: Download patch artifact
        uses: actions/download-artifact@v4
        with:
          name: claude-changes-patch
          path: /tmp/patch

      - name: Apply patch and create draft PR
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          git config user.name "Claude Bot"
          git config user.email "claude-bot@users.noreply.github.com"
          if [ ! -s /tmp/patch/claude-changes.patch ]; then
            echo "::warning::Patch file is empty, nothing to apply"
            exit 0
          fi

          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          NEW_BRANCH="claude-patch-${{ github.run_id }}"

          git checkout -b "$NEW_BRANCH"
          git apply /tmp/patch/claude-changes.patch
          git add -A
          git commit -m "AI: apply Claude suggestions"
          git push origin "$NEW_BRANCH"

          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$NEW_BRANCH" \
            --title "[Claude] Auto patch from run ${{ github.run_id }}" \
            --body "This PR was generated by applying the Claude patch artifact. Please review before merging." \
            --draft

          echo "::notice::Created draft PR from branch $NEW_BRANCH to $BASE_BRANCH"
